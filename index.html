<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Real-Time TV Monitor - KORPASGAT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #11141a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background-color: #1a1f2c;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #3498db;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
            max-width: 900px;
            margin: 0 auto;
        }
        .btn-source {
            background-color: #e74c3c;
            color: white;
            padding: 12px 24px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            display: inline-block;
            transition: background 0.2s;
        }
        .btn-source:hover { background-color: #c0392b; }
        
        .cloud-input-group {
            display: flex;
            gap: 5px;
            width: 100%;
            max-width: 450px;
        }
        .cloud-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #34495e;
            border-radius: 6px;
            background-color: #2c3e50;
            color: white;
            font-size: 14px;
        }
        .btn-cloud {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-cloud:hover { background-color: #27ae60; }

        .btn-fullscreen {
            background-color: #f39c12;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: background 0.2s;
        }
        .btn-fullscreen:hover { background-color: #d35400; }

        .viewer-area {
            flex: 1;
            padding: 25px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .content-box {
            width: 100%;
            max-width: 1200px;
            background: #ffffff;
            color: #222222;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            font-size: 20px;
            line-height: 1.6;
            min-height: 400px;
            transition: all 0.3s;
            box-sizing: border-box;
            overflow: auto;
        }
        
        .content-box:fullscreen {
            max-width: 100% !important;
            width: 100vw !important;
            height: 100vh !important;
            border-radius: 0 !important;
            padding: 15px !important;
            background-color: #ffffff;
        }
        
        iframe {
            width: 100%;
            height: 75vh;
            border: none;
            border-radius: 8px;
            background: white;
            display: block;
        }
        
        .status-tv {
            font-size: 13px;
            color: #2ecc71;
            margin-top: 12px;
            font-weight: bold;
            background: rgba(46, 204, 113, 0.1);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .excel-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 16px;
            color: #111111;
            background: #ffffff;
            margin-top: 10px;
        }
        .excel-table th, .excel-table td {
            border: 1px solid #b0b0b0;
            padding: 12px 14px;
            text-align: left;
        }
        .excel-table th {
            background-color: #2980b9 !important;
            color: white !important;
            font-weight: bold;
        }
        .excel-table tr:nth-child(even) {
            background-color: #f8fafd;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="title">📺 Universal Real-Time TV Monitor</div>
    
    <div class="control-panel">
        <div>
            <label for="fileInput" class="btn-source">📁 Kirim File dari HP/PC</label>
            <input type="file" id="fileInput" accept=".docx, .pdf, .txt, .xlsx, .xls, .pptx, .ppt, image/*" style="display: none;">
        </div>
        <div class="cloud-input-group">
            <input type="url" id="cloudUrl" class="cloud-input" placeholder="Masukkan Tautan Google Sheets / Slides / Drive / Web...">
            <button class="btn-cloud" onclick="kirimTautan()">Kirim Link</button>
        </div>
        <button class="btn-fullscreen" onclick="toggleFullScreen()">🖥️ Full Screen</button>
    </div>
    <div class="status-tv" id="koneksiStatus">Menghubungkan ke Sistem Jaringan...</div>
</div>

<div class="viewer-area">
    <div class="content-box" id="contentBox">
        <p style="text-align: center; color: #7f8c8d; font-size: 18px;">Menunggu kiriman data/dokumen dari perangkat HP...</p>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://ftokzxocmfwzitafwqoz.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0b2t6eG9jbWZ3eml0YWZ3cW96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzODQ0MjksImV4cCI6MjA5ODk2MDQyOX0.-gHTYgaL5Skq8BOLZ1g4wt74tcfTPcqBkt81u-8WHGU";

    let supabaseClient = null;
    let channelRealtime = null;

    window.onload = function() {
        inisialisasiSupabase();
    };

    function inisialisasiSupabase() {
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            document.getElementById('koneksiStatus').innerHTML = "Sistem Sinkronisasi Otomatis Terhubung 🟢";
            
            channelRealtime = supabaseClient.channel('tv_channel', {
                config: { broadcast: { self: true } }
            });

            channelRealtime.on('broadcast', { event: 'update_doc' }, (response) => {
                if (response.payload) {
                    tampilkanDokumen(response.payload);
                }
            }).subscribe();

        } catch (e) {
            document.getElementById('koneksiStatus').innerHTML = "Gagal Terhubung ke Cloud Server 🔴";
        }
    }

    function toggleFullScreen() {
        const targetVisual = document.getElementById("contentBox");
        if (!document.fullscreenElement) {
            targetVisual.requestFullscreen().catch(err => {
                alert(`Gagal mengaktifkan mode Full Screen: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }

    document.getElementById('fileInput').addEventListener('change', async function(event) {
        if (!supabaseClient) return alert("Koneksi server terputus!");
        const file = event.target.files[0];
        if (!file) return;

        const extension = file.name.split('.').pop().toLowerCase();
        const uniqueTime = new Date().getTime();
        const secureFileName = `${uniqueTime}.${extension}`;
        
        document.getElementById('contentBox').innerHTML = '<p style="text-align: center; color: #3498db; font-size: 18px;">Sedang memproses dan mengunggah berkas ke cloud...</p>';

        try {
            const { data, error } = await supabaseClient
                .storage
                .from('dokumen')
                .upload(secureFileName, file, { 
                    cacheControl: '0', 
                    upsert: true
                });

            if (error) throw error;

            const { data: urlData } = supabaseClient.storage.from('dokumen').getPublicUrl(secureFileName);
            if (!urlData || !urlData.publicUrl) throw new Error("Gagal generate link publik.");

            await channelRealtime.send({
                type: 'broadcast',
                event: 'update_doc',
                payload: { 
                    url: urlData.publicUrl, 
                    type: 'file', 
                    ext: extension 
                }
            });

            alert("Sukses! File berhasil dikirim.");
        } catch (error) {
            alert("Gagal Mengirim: " + error.message);
            document.getElementById('contentBox').innerHTML = `<p style="text-align: center; color: #e74c3c; font-size: 18px;">Gagal memproses file: ${error.message}</p>`;
        }
    });

    async function kirimTautan() {
        if (!supabaseClient || !channelRealtime) return alert("Koneksi server terputus!");
        let url = document.getElementById('cloudUrl').value.trim();
        if (!url) return alert("Silakan masukkan tautan terlebih dahulu!");

        let finalUrl = url;
        
        // ENGINE DETEKSI & PARSING KHUSUS LINK GOOGLE DRIVE BYPASS COOKIE SECURITY
        if (url.includes("docs.google.com/spreadsheets")) {
            // Google Sheets Bypass
            let sheetId = url.split('/d/')[1].split('/')[0];
            finalUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/preview?rm=minimal`;
        } 
        else if (url.includes("docs.google.com/presentation")) {
            // Google Slides Bypass
            let slideId = url.split('/d/')[1].split('/')[0];
            finalUrl = `https://docs.google.com/presentation/d/${slideId}/embed?rm=minimal`;
        } 
        else if (url.includes("docs.google.com/document")) {
            // Google Docs Bypass
            let docId = url.split('/d/')[1].split('/')[0];
            finalUrl = `https://docs.google.com/document/d/${docId}/preview`;
        }
        else if (url.includes("drive.google.com/file/d/")) {
            // File Umum di Drive (PDF, Word, Video, Excel, dll)
            let fileId = url.split('/file/d/')[1].split('/')[0];
            finalUrl = `https://drive.google.com/file/d/${fileId}/preview`;
        } 
        else if (url.includes("drive.google.com/drive/folders/")) {
            // Folder Drive Bypass
            let folderId = url.split('/folders/')[1].split('?')[0];
            finalUrl = `https://drive.google.com/embeddedfolderview?id=${folderId}#grid`;
        }

        await channelRealtime.send({
            type: 'broadcast',
            event: 'update_doc',
            payload: { url: finalUrl, type: 'link', ext: '' }
        });
        
        alert("Link sukses disiarkan!");
        document.getElementById('cloudUrl').value = "";
    }

    function tampilkanDokumen(payload) {
        const box = document.getElementById('contentBox');
        box.innerHTML = "";
        box.style.background = "#ffffff";
        box.style.padding = "25px";

        const ext = payload.ext ? payload.ext.toLowerCase() : '';

        if (payload.type === 'link') {
            box.style.background = "transparent";
            box.style.padding = "0";
            box.innerHTML = `<iframe src="${payload.url}" allow="autoplay"></iframe>`;
        } 
        else if (ext === 'docx') {
            fetch(payload.url).then(res => res.arrayBuffer()).then(buffer => {
                mammoth.convertToHtml({arrayBuffer: buffer}).then(result => {
                    box.innerHTML = `<div style="font-size:24px; color:#222; text-align:left;">${result.value}</div>`;
                });
            }).catch(err => {
                box.innerHTML = `<p style="text-align:center; color:#e74c3c;">Gagal membaca file Word</p>`;
            });
        } 
        else if (['xlsx', 'xls'].includes(ext)) {
            fetch(payload.url)
                .then(res => {
                    if (!res.ok) throw new Error("File tidak ditemukan.");
                    return res.arrayBuffer();
                })
                .then(buffer => {
                    const workbook = XLSX.read(new Uint8Array(buffer), { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    
                    const htmlTable = XLSX.utils.sheet_to_html(worksheet);
                    box.innerHTML = `<div style="width:100%; overflow-x:auto;">${htmlTable}</div>`;
                    
                    const tableEl = box.querySelector('table');
                    if (tableEl) {
                        tableEl.classList.add('excel-table');
                        tableEl.removeAttribute('border');
                    }
                })
                .catch(err => {
                    // Jika pembacaan lokal gagal, oper ke Microsoft Office Live Viewer yang stabil
                    box.style.background = "transparent";
                    box.style.padding = "0";
                    box.innerHTML = `<iframe src="https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(payload.url)}"></iframe>`;
                });
        } 
        else if (['pptx', 'ppt'].includes(ext)) {
            box.style.background = "transparent";
            box.style.padding = "0";
            const officeViewerUrl = `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(payload.url)}`;
            box.innerHTML = `<iframe src="${officeViewerUrl}"></iframe>`;
        } 
        else if (ext === 'pdf') {
            box.style.background = "transparent";
            box.style.padding = "0";
            const pdfViewerUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(payload.url)}&embedded=true`;
            box.innerHTML = `<iframe src="${pdfViewerUrl}"></iframe>`;
        }
        else if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) {
            box.style.background = "transparent";
            box.style.padding = "0";
            box.innerHTML = `<img src="${payload.url}?t=${new Date().getTime()}" style="max-width:100%; max-height:75vh; display:block; margin:0 auto; border-radius:8px; box-shadow:0 4px 15px rgba(0,0,0,0.3);">`;
        } 
        else if (ext === 'txt') {
            fetch(payload.url).then(res => res.text()).then(text => {
                box.innerHTML = `<pre style="white-space: pre-wrap; font-size:22px; color:#222; text-align:left; font-family:monospace;">${text}</pre>`;
            });
        } 
        else {
            box.style.background = "transparent";
            box.style.padding = "0";
            box.innerHTML = `<iframe src="${payload.url}"></iframe>`;
        }
    }
</script>
</body>
</html>
