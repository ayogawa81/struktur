<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Document Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        /* Desain Khusus TV: Latar belakang gelap agar tidak membuat mata silau */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #11141a;
            color: #ffffff;
            overflow: hidden; /* Mencegah scrollbar utama TV muncul */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Kontrol atas yang besar dan mudah diklik/dilihat dari jauh */
        .tv-header {
            background-color: #1a1f2c;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #3498db;
        }

        .tv-title {
            font-size: 24px;
            font-weight: bold;
            color: #3498db;
        }

        .btn-upload {
            background-color: #e74c3c;
            color: white;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }

        /* Area Tampilan Dokumen - Dioptimalkan untuk Skala Besar */
        .tv-viewer-container {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Isi dokumen diperbesar otomatis (Font Besar untuk TV) */
        .tv-content-box {
            width: 100%;
            max-width: 1200px;
            background: #ffffff;
            color: #222222;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-size: 28px; /* Font super besar agar terbaca dari jarak 3 meter */
            line-height: 1.6;
            display: none;
        }

        /* Pengaturan khusus jika file yang dibuka adalah PDF */
        iframe {
            width: 100%;
            height: 80vh;
            border: none;
            border-radius: 12px;
            background: white;
        }

        /* Pengaturan gambar jika di-upload */
        img {
            max-width: 100%;
            max-height: 80vh;
            display: block;
            margin: 0 auto;
            border-radius: 8px;
        }

        /* Petunjuk Remote/Keyboard di bagian bawah */
        .tv-footer {
            background: #1a1f2c;
            text-align: center;
            padding: 10px;
            font-size: 16px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="tv-header">
    <div class="tv-title">📺 TV Document Viewer</div>
    <div>
        <label for="fileInput" class="btn-upload">📁 PILIH FILE (PC)</label>
        <input type="file" id="fileInput" accept=".docx, .pdf, .txt, image/*" style="display: none;">
    </div>
</div>

<div class="tv-viewer-container">
    <div class="tv-content-box" id="tvContentBox">
        <p style="text-align: center; color: #7f8c8d;">Silakan pilih dokumen menggunakan tombol di atas.</p>
    </div>
</div>

<div class="tv-footer">
    Gunakan Mouse/Keyboard Wireless atau Remote TV untuk navigasi scroll.
</div>

<script>
    document.getElementById('fileInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        const contentBox = document.getElementById('tvContentBox');
        
        // Reset & tampilkan box
        contentBox.innerHTML = "";
        contentBox.style.display = "block";
        // Sesuaikan background: Putih untuk dokumen, transparan jika PDF/Gambar
        contentBox.style.background = "#ffffff"; 

        if (!file) return;

        const fileType = file.name.split('.').pop().toLowerCase();

        // 1. TAMPILAN PDF (Otomatis Fullscreen di TV)
        if (fileType === 'pdf') {
            const fileURL = URL.createObjectURL(file);
            contentBox.style.background = "transparent";
            contentBox.style.padding = "0";
            contentBox.innerHTML = `<iframe src="${fileURL}"></iframe>`;
        } 
        
        // 2. TAMPILAN WORD (.DOCX) dengan Font Besar
        else if (fileType === 'docx') {
            const reader = new FileReader();
            reader.onload = function(event) {
                const arrayBuffer = event.target.result;
                mammoth.convertToHtml({arrayBuffer: arrayBuffer})
                    .then(function(result) {
                        // Memasukkan text dan memaksa ukuran font besar lewat CSS h1, p, dll.
                        contentBox.innerHTML = `<div class="docx-large-text">${result.value}</div>`;
                        applyTvStyling();
                    })
                    .catch(function(err) {
                        contentBox.innerHTML = "<p style='color:red;'>Gagal membaca file: " + err.message + "</p>";
                    });
            };
            reader.readAsArrayBuffer(file);
        } 
        
        // 3. TAMPILAN TEXT (.TXT)
        else if (fileType === 'txt') {
            const reader = new FileReader();
            reader.onload = function(event) {
                contentBox.innerHTML = `<pre style="white-space: pre-wrap; font-size: 32px;">${event.target.result}</pre>`;
            };
            reader.readAsText(file);
        } 
        
        // 4. TAMPILAN GAMBAR
        else if (['jpg', 'jpeg', 'png', 'gif'].includes(fileType)) {
            const fileURL = URL.createObjectURL(file);
            contentBox.style.background = "transparent";
            contentBox.innerHTML = `<img src="${fileURL}">`;
        }
    });

    // Fungsi tambahan untuk memastikan semua teks dokumen Word menjadi besar di TV
    function applyTvStyling() {
        const elements = document.querySelectorAll('.docx-large-text *');
        elements.forEach(el => {
            el.style.fontSize = "28px";
            el.style.lineHeight = "1.8";
        });
    }
</script>

</body>
</html>
