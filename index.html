<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Document Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        /* Desain Modern & Responsive (Bisa menyesuaikan layar TV, PC, maupun HP) */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #11141a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: #1a1f2c;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 3px solid #3498db;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 15px;
        }

        /* Panel Kontrol Pengiriman File */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Tombol Upload untuk HP / PC */
        .btn-source {
            background-color: #e74c3c;
            color: white;
            padding: 10px 20px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            display: inline-block;
        }

        .btn-source:hover { background-color: #c0392b; }

        /* Input Link Cloud (Google Drive / Dropbox) */
        .cloud-input-group {
            display: flex;
            gap: 5px;
            width: 100%;
            max-width: 450px;
        }

        .cloud-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #34495e;
            border-radius: 6px;
            background-color: #2c3e50;
            color: white;
            font-size: 14px;
        }

        .btn-cloud {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Area Tampilan Dokumen */
        .viewer-area {
            flex: 1;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Box Konten Dokumen (Tulisan Besar otomatis disesuaikan untuk TV/HP) */
        .content-box {
            width: 100%;
            max-width: 1000px;
            background: #ffffff;
            color: #222222;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            font-size: 24px; /* Ukuran default besar agar terbaca di TV, tapi fleksibel */
            line-height: 1.6;
            display: none;
            overflow-x: auto;
        }

        iframe {
            width: 100%;
            height: 75vh;
            border: none;
            border-radius: 8px;
            background: white;
        }

        img {
            max-width: 100%;
            max-height: 75vh;
            display: block;
            margin: 0 auto;
            border-radius: 6px;
        }

        /* Responsivitas untuk Layar HP */
        @media (max-width: 600px) {
            .content-box {
                font-size: 16px; /* Mengecil di HP agar tidak terlalu raksasa */
                padding: 15px;
            }
            .title { font-size: 18px; }
            .control-panel { flex-direction: column; width: 100%; }
            .cloud-input-group { width: 100%; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="title">📱📺 Universal Document Viewer</div>
    <div class="control-panel">
        
        <div>
            <label for="fileInput" class="btn-source">📁 Upload File (HP/PC)</label>
            <input type="file" id="fileInput" accept=".docx, .pdf, .txt, image/*" style="display: none;">
        </div>

        <div class="cloud-input-group">
            <input type="url" id="cloudUrl" class="cloud-input" placeholder="Paste link Google Drive / Cloud publik...">
            <button class="btn-cloud" onclick="viewFromCloud()">Buka</button>
        </div>

    </div>
</div>

<div class="viewer-area">
    <div class="content-box" id="contentBox">
        <p style="text-align: center; color: #7f8c8d; font-size: 18px;">Silakan pilih file dari HP/PC atau masukkan tautan Cloud Storage di atas.</p>
    </div>
</div>

<script>
    const contentBox = document.getElementById('contentBox');

    // ==========================================
    // 1. MEMPROSES FILE DARI HP / PC (LOKAL)
    // ==========================================
    document.getElementById('fileInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        resetViewer();

        if (!file) return;
        const fileType = file.name.split('.').pop().toLowerCase();

        if (fileType === 'pdf') {
            const fileURL = URL.createObjectURL(file);
            renderIframe(fileURL);
        } 
        else if (fileType === 'docx') {
            const reader = new FileReader();
            reader.onload = function(e) {
                mammoth.convertToHtml({arrayBuffer: e.target.result})
                    .then(function(result) {
                        contentBox.innerHTML = `<div class="large-text">${result.value}</div>`;
                        adjustTextSize();
                    })
                    .catch(err => alert("Gagal membaca Word: " + err.message));
            };
            reader.readAsArrayBuffer(file);
        } 
        else if (fileType === 'txt') {
            const reader = new FileReader();
            reader.onload = e => contentBox.innerHTML = `<pre style="white-space: pre-wrap;">${e.target.result}</pre>`;
            reader.readAsText(file);
        } 
        else if (['jpg', 'jpeg', 'png', 'gif'].includes(fileType)) {
            contentBox.style.background = "transparent";
            contentBox.innerHTML = `<img src="${URL.createObjectURL(file)}">`;
        }
    });

    // ==========================================
    // 2. MEMPROSES FILE DARI LINK CLOUD STORAGE
    // ==========================================
    function viewFromCloud() {
        let url = document.getElementById('cloudUrl').value.trim();
        if (!url) return alert("Masukkan URL Cloud terlebih dahulu!");

        resetViewer();

        // Antisipasi otomatis jika pengguna memasukkan link sharing Google Drive standar
        if (url.includes("drive.google.com")) {
            // Mengubah link sharing Google Drive biasa menjadi format direct preview/embed
            url = url.replace(/\/view\?usp=sharing|\/view/g, "/preview");
            renderIframe(url);
        } else {
            // Menggunakan Google Docs Viewer API untuk link cloud publik umum (Dropbox, OneDrive, Hosting, dll)
            const proxyUrl = `https://docs.google.com/gview?url=${encodeURIComponent(url)}&embedded=true`;
            renderIframe(proxyUrl);
        }
    }

    // Helper Functions
    function resetViewer() {
        contentBox.innerHTML = "";
        contentBox.style.display = "block";
        contentBox.style.background = "#ffffff";
        contentBox.style.padding = "30px";
    }

    function renderIframe(srcUrl) {
        contentBox.style.background = "transparent";
        contentBox.style.padding = "0";
        contentBox.innerHTML = `<iframe src="${srcUrl}"></iframe>`;
    }

    function adjustTextSize() {
        // Jika layar lebar (seperti TV), paksa teks dokumen berukuran besar agar terbaca jauh
        if (window.innerWidth > 1024) {
            document.querySelectorAll('.large-text *').forEach(el => {
                el.style.fontSize = "26px";
                el.style.lineHeight = "1.8";
            });
        }
    }
</script>

</body>
</html>
