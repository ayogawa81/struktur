<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struktur Organisasi - Korpasgat Photo & Edit Layout</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0b1329; color: #f8fafc; min-height: 100vh;
            display: flex; flex-direction: column; overflow-x: auto; position: relative;
        }
        header {
            background: linear-gradient(90deg, #1c2541, #0b1329);
            padding: 20px 40px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 4px solid #f97316;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 100%; position: sticky; top: 0; z-index: 10;
        }
        .logo-title h1 { font-size: 2rem; font-weight: 800; letter-spacing: 1.5px; color: #ffffff; text-transform: uppercase; }
        .logo-title p { color: #f97316; font-size: 1rem; margin-top: 5px; font-weight: 600; letter-spacing: 0.5px; }
        
        /* CONTAINER STRUKTUR UTAMA */
        main { flex: 1; padding: 50px 20px; display: flex; justify-content: center; align-items: flex-start; min-width: 1300px; }
        .tree { display: flex; flex-direction: column; align-items: center; gap: 50px; width: 100%; }
        
        /* BARIS STRUKTUR */
        .row { display: flex; justify-content: center; gap: 40px; width: 100%; position: relative; min-height: 120px; }

        /* GARIS HUBUNG ANTAR BARIS */
        .row::before {
            content: ''; position: absolute; top: -25px; left: 50%;
            width: 3px; height: 25px; background-color: #f97316; display: none;
        }
        .tree > .row ~ .row::before { display: block; }

        /* KOTAK JABATAN (CARD) DENGAN FOTO */
        .card {
            background: #1c2541; border: 2px solid #3a506b; border-radius: 14px;
            padding: 20px; width: 280px; text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease; position: relative;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .card:hover { 
            border-color: #f97316; 
            transform: translateY(-5px); 
            box-shadow: 0 15px 25px rgba(249, 115, 22, 0.3); 
        }
        
        /* WARNA TEMATIK BERDASARKAN BARIS */
        .row-idx-1 .card { border-color: #f97316; background: linear-gradient(180deg, #1c2541 0%, #3a2214 100%); }
        .row-idx-1 .role { color: #f97316; }
        
        .row-idx-2 .card { border-color: #0284c7; background: linear-gradient(180deg, #1c2541 0%, #132a3a 100%); }
        .row-idx-2 .role { color: #0284c7; }
        
        .row-idx-3 .card { border-color: #64748b; background-color: #1c2541; }
        .row-idx-3 .role { color: #cbd5e1; }
        
        .row-idx-4 .card { border-color: #475569; background-color: #111827; }
        .row-idx-4 .role { color: #94a3b8; }

        /* FRAME FOTO PERSONEL */
        .photo-frame {
            width: 90px; height: 110px; border-radius: 8px;
            border: 2px solid #3a506b; background-color: #0b1329;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
