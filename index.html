<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Real-Time TV Monitor - KORPASGAT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #11141a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background-color: #1a1f2c;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 3px solid #3498db;
        }
        .title {
            font-size: 22px;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 10px;
        }
        .setup-box {
            background-color: #1c2331;
            border: 1px dashed #3498db;
            padding: 15px;
            border-radius: 8px;
            max-width: 750px;
            margin: 10px auto;
            font-size: 13px;
            text-align: left;
        }
        .setup-row {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        .setup-input {
            flex: 1;
            padding: 8px;
            background: #2c3e50;
            border: 1px solid #4f5d73;
            color: white;
            border-radius: 4px;
            font-size: 12px;
        }
        .btn-save-key {
            background: #3498db;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            max-width: 800px;
            margin: 15px auto 0 auto;
        }
        .btn-source {
            background-color: #e74c3c;
            color: white;
            padding: 10px 20px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            display: inline-block;
        }
        .btn-source:hover { background-color: #c0392b; }
        .cloud-input-group {
            display: flex;
            gap: 5px;
            width: 100%;
            max-width: 450px;
        }
        .cloud-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #34495e;
            border-radius: 6px;
            background-color: #2c3e50;
            color: white;
            font-size: 14px;
        }
        .btn-cloud {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-cloud:hover { background-color: #27ae60; }
        .viewer-area {
            flex: 1;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .content-box {
            width: 100%;
            max-width: 1100px;
            background: #ffffff;
            color: #222222;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            font-size: 24px;
            line-height: 1.6;
            min-height: 200px;
        }
        iframe {
            width: 100%;
            height: 70vh;
            border: none;
            border-radius: 8px;
            background: white;
        }
        img {
            max-width: 100%;
            max-height: 70vh;
            display: block;
            margin: 0 auto;
            border-radius: 6px;
        }
        .status-tv {
            font-size: 14px;
            color: #bdc3c7;
            margin-top: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="title">📺 Universal Real-Time TV Monitor</div>
    
    <div class="setup-box">
        <strong>⚙️ Pengaturan Koneksi Supabase (Isi langsung di sini, tidak perlu bongkar kode GitHub):</strong>
        <div class="setup-row">
            <input type="text" id="cfgUrl" class="setup-input" placeholder="Masukkan Project URL">
            <input type="text" id="cfgKey" class="setup-input" placeholder="Masukkan anon public Key yang diawali eyJhbGciOi...">
            <button class="btn-save-key" onclick="simpanKonfigurasi()">Simpan & Hubungkan</button>
        </div>
    </div>

    <div class="control-panel">
        <div>
            <label for="fileInput" class="btn-source">📁 Kirim File dari HP/PC</label>
            <input type="file" id="fileInput" accept=".docx, .pdf, .txt, image/*" style="display: none;">
        </div>
        <div class="cloud-input-group">
            <input type="url" id="cloudUrl" class="cloud-input" placeholder="Masukkan Link Google Sheets / Slides / Drive...">
            <button class="btn-cloud" onclick="kirimTautan()">Kirim Link</button>
        </div>
    </div>
    <div class="status-tv" id="koneksiStatus">Status: Menunggu Konfigurasi URL & Key 🔴</div>
</div>

<div class="viewer-area">
    <div class="content-box" id="contentBox">
        <p style="text-align: center; color: #7f8c8d; font-size: 18px;">Silakan isi Project URL dan anon public key di atas terlebih dahulu pada HP/Laptop Anda, lalu klik Simpan.</p>
    </div>
</div>

<script>
    let supabaseClient = null;

    window.onload = function() {
        const savedUrl = localStorage.getItem('sb_url') || "";
        const savedKey = localStorage.getItem('sb_key') || "";
        
        if (savedUrl) document.getElementById('cfgUrl').value = savedUrl;
        if (savedKey) document.getElementById('cfgKey').value = savedKey;

        if (savedUrl && savedKey) {
            inisialisasiSupabase(savedUrl, savedKey);
        }
    };

    function simpanKonfigurasi() {
        // Membersihkan karakter spasi atau garis miring di ujung teks input
        let url = document.getElementById('cfgUrl').value.trim();
        if(url.endsWith('/')) { url = url.slice(0, -1); }
        const key = document.getElementById('cfgKey').value.trim();

        if (!url || !key) {
            alert("Harap isi kedua kolom URL dan Key dengan benar!");
            return;
        }

        localStorage.setItem('sb_url', url);
        localStorage.setItem('sb_key', key);
        
        inisialisasiSupabase(url, key);
        alert("Konfigurasi diperbarui & dibersihkan! Menghubungkan ulang...");
    }

    function inisialisasiSupabase(url, key) {
        try {
            supabaseClient = supabase.createClient(url, key);
            document.getElementById('koneksiStatus').innerHTML = "Sistem Sinkronisasi Terhubung 🟢 (Ready via Real-Time)";
            document.getElementById('contentBox').innerHTML = '<p style="text-align: center; color: #7f8c8d; font-size: 18px;">Siap menerima dokumen! Silakan kirim file atau link dari HP atau PC Anda.</p>';
            
            supabaseClient.channel('tv_channel')
            .on('broadcast', { event: 'update_doc' }, (response) => {
                if(response.payload) tampilkanDokumen(response.payload);
            })
            .subscribe();
        } catch (e) {
            document.getElementById('koneksiStatus').innerHTML = "Gagal Terhubung 🔴 Periksa URL / Key";
            alert("Terjadi kesalahan inisialisasi: " + e.message);
        }
    }

    document.getElementById('fileInput').addEventListener('change', async function(event) {
        if (!supabaseClient) return alert("Supabase belum terhubung! Isi URL dan Key di atas.");
        const file = event.target.files[0];
        if (!file) return;

        const extension = file.name.split('.').pop().toLowerCase();
        // Memaksa penamaan statis agar nama file asli laptop yang aneh tidak merusak URL path
        const secureFileName = `file_monitor.${extension}`;
        
        document.getElementById('contentBox').innerHTML = '<p style="text-align: center; color: #3498db; font-size: 18px;">Sedang mengunggah berkas ke cloud server...</p>';

        try {
            // Pembersihan paksa cache upload Supabase SDK
            const { data, error } = await supabaseClient
                .storage
                .from('dokumen')
                .upload(secureFileName, file, { 
                    upsert: true,
                    contentType: file.type
                });

            if (error) throw error;

            const { data: urlData } = supabaseClient.storage.from('dokumen').getPublicUrl(secureFileName);

            await supabaseClient.channel('tv_channel').send({
                type: 'broadcast',
                event: 'update_doc',
                payload: { url: urlData.publicUrl, type: 'file', ext: extension }
            });

            alert("Sukses! File berhasil disiarkan.");
        } catch (error) {
            alert("Error Upload: " + error.message);
            document.getElementById('contentBox').innerHTML = '<p style="text-align: center; color: #e74c3c; font-size: 18px;">Gagal memproses file. Periksa sambungan atau hapus riwayat cache browser Anda.</p>';
        }
    });

    async function kirimTautan() {
        if (!supabaseClient) return alert("Supabase belum terhubung! Isi URL dan Key di atas.");
        let url = document.getElementById('cloudUrl').value.trim();
        if (!url) return alert("Silakan masukkan tautan terlebih dahulu!");

        let finalUrl = url;
        if (url.includes("docs.google.com/spreadsheets")) {
            finalUrl = `${url.split('/edit')[0]}/preview?rm=minimal`;
        } else if (url.includes("drive.google.com") || url.includes("docs.google.com")) {
            finalUrl = url.replace(/\/view\?usp=sharing|\/view|\/edit\?usp=sharing|\/edit/g, "/preview");
        }

        await supabaseClient.channel('tv_channel').send({
            type: 'broadcast',
            event: 'update_doc',
            payload: { url: finalUrl, type: 'link' }
        });
        alert("Link berhasil disiarkan ke monitor!");
    }

    function tampilkanDokumen(payload) {
        const box = document.getElementById('contentBox');
        box.innerHTML = "";
        box.style.background = "#ffffff";
        box.style.padding = "30px";

        if (payload.type === 'link' || payload.ext === 'pdf') {
            box.style.background = "transparent";
            box.style.padding = "0";
            box.innerHTML = `<iframe src="${payload.url}"></iframe>`;
        } else if (payload.ext === 'docx') {
            fetch(payload.url).then(res => res.arrayBuffer()).then(buffer => {
                mammoth.convertToHtml({arrayBuffer: buffer}).then(result => {
                    box.innerHTML = `<div style="font-size:24px; color:#222;">${result.value}</div>`;
                });
            });
        } else if (['jpg', 'jpeg', 'png', 'gif'].includes(payload.ext)) {
            box.style.background = "transparent";
            box.innerHTML = `<img src="${payload.url}?t=${new Date().getTime()}">`;
        } else if (payload.ext === 'txt') {
            fetch(payload.url).then(res => res.text()).then(text => {
                box.innerHTML = `<pre style="white-space: pre-wrap; font-size:20px; color:#222;">${text}</pre>`;
            });
        }
    }
</script>
</body>
</html>
