<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Document Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        /* Desain Modern & Kontras Tinggi (Sangat Ramah untuk TV, PC, dan HP) */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #11141a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: #1a1f2c;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 3px solid #3498db;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 15px;
        }

        /* Panel Kontrol Pengiriman File */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Tombol Upload untuk HP / PC */
        .btn-source {
            background-color: #e74c3c;
            color: white;
            padding: 10px 20px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            display: inline-block;
        }

        .btn-source:hover { background-color: #c0392b; }

        /* Input Link Cloud (Google Drive, Sheets, Dropbox) */
        .cloud-input-group {
            display: flex;
            gap: 5px;
            width: 100%;
            max-width: 450px;
        }

        .cloud-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #34495e;
            border-radius: 6px;
            background-color: #2c3e50;
            color: white;
            font-size: 14px;
        }

        .btn-cloud {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-cloud:hover { background-color: #27ae60; }

        /* Area Tampilan Dokumen */
        .viewer-area {
            flex: 1;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Box Konten Dokumen (Tulisan Besar otomatis disesuaikan untuk TV/HP) */
        .content-box {
            width: 100%;
            max-width: 1100px;
            background: #ffffff;
            color: #222222;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            font-size: 24px; /* Default besar agar terbaca jelas di TV */
            line-height: 1.6;
            display: none;
            overflow-x: auto;
        }

        /* Styling Iframe agar bersih dan memenuhi layar pratinjau */
        iframe {
            width: 100%;
            height: 75vh;
            border: none;
            border-radius: 8px;
            background: white;
        }

        img {
            max-width: 100%;
            max-height: 75vh;
            display: block;
            margin: 0 auto;
            border-radius: 6px;
        }

        /* Responsivitas Otomatis untuk Layar HP */
        @media (max-width: 600px) {
            .content-box {
                font-size: 16px; /* Ukuran mengecil di HP agar tidak terlalu raksasa */
                padding: 15px;
            }
            .title { font-size: 18px; }
            .control-panel { flex-direction: column; width: 100%; }
            .cloud-input-group { width: 100%; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="title">📱📺 Universal Document Viewer</div>
    <div class="control-panel">
        
        <div>
            <label for="fileInput" class="btn-source">📁 Upload File (HP/PC)</label>
            <input type="file" id="fileInput" accept=".docx, .pdf, .txt, image/*" style="display: none;">
        </div>

        <div class="cloud-input-group">
            <input type="url" id="cloudUrl" class="cloud-input" placeholder="Paste link Google Sheets / Cloud publik...">
            <button class="btn-cloud" onclick="viewFromCloud()">Buka</button>
        </div>

    </div>
</div>

<div class="viewer-area">
    <div class="content-box" id="contentBox">
        <p style="text-align: center; color: #7f8c8d; font-size: 18px;">Silakan pilih file dari HP/PC atau masukkan tautan Cloud Storage di atas.</p>
    </div>
</div>

<script>
    const contentBox = document.getElementById('contentBox');

    // ===================================================
    // 1. MEMPROSES FILE DARI LOKAL (PC / MEMORI HP)
    // ===================================================
    document.getElementById('fileInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        resetViewer();

        if (!file) return;
        const fileType = file.name.split('.').pop().toLowerCase();

        if (fileType === 'pdf') {
            const fileURL = URL.createObjectURL(file);
            renderIframe(fileURL);
        } 
        else if (fileType === 'docx') {
            const reader = new FileReader();
            reader.onload = function(e) {
                mammoth.convertToHtml({arrayBuffer: e.target.result})
                    .then(function(result) {
                        contentBox.innerHTML = `<div class="large-text">${result.value}</div>`;
                        adjustTextSize();
                    })
                    .catch(err => alert("Gagal membaca file Word: " + err.message));
            };
            reader.readAsArrayBuffer(file);
        } 
        else if (fileType === 'txt') {
            const reader = new FileReader();
            reader.onload = e => contentBox.innerHTML = `<pre style="white-space: pre-wrap;">${e.target.result}</pre>`;
            reader.readAsText(file);
        } 
        else if (['jpg', 'jpeg', 'png', 'gif'].includes(fileType)) {
            contentBox.style.background = "transparent";
            contentBox.innerHTML = `<img src="${URL.createObjectURL(file)}">`;
        }
    });

    // ===================================================
    // 2. MEMPROSES FILE DARI TAUTAN CLOUD STORAGE
    // ===================================================
    function viewFromCloud() {
        let url = document.getElementById('cloudUrl').value.trim();
        if (!url) return alert("Masukkan URL Cloud terlebih dahulu!");

        resetViewer();

        // A. PENANGANAN OTOMATIS JIKA INPUT ADALAH GOOGLE SPREADSHEET / SHEET
        if (url.includes("docs.google.com/spreadsheets")) {
            // Mengubah ujung link /edit menjadi /preview dengan parameter minimal agar tidak memicu error terbitan
            let baseSpreadsheetUrl = url.split('/edit')[0];
            let spreadsheetPreviewUrl = `${baseSpreadsheetUrl}/preview?rm=minimal`;
            renderIframe(spreadsheetPreviewUrl);
        } 
        // B. PENANGANAN JIKA INPUT ADALAH GOOGLE DOCS / SLIDES / DRIVE LAINNYA
        else if (url.includes("drive.google.com") || url.includes("docs.google.com")) {
            // Mengubah parameter sharing biasa menjadi format preview iframe yang diizinkan oleh Google
            let embedUrl = url.replace(/\/view\?usp=sharing|\/view|\/edit\?usp=sharing|\/edit/g, "/preview");
            renderIframe(embedUrl);
        } 
        // C. JIKA LINK CLOUD LUAR (Dropbox, OneDrive, Hosting Publik, dll)
        else {
            // Menggunakan Google Docs Viewer API pihak ketiga sebagai jembatan pembaca otomatis
            const proxyUrl = `https://docs.google.com/gview?url=${encodeURIComponent(url)}&embedded=true`;
            renderIframe(proxyUrl);
        }
    }

    // Fungsi Pembantu (Helpers)
    function resetViewer() {
        contentBox.innerHTML = "";
        contentBox.style.display = "block";
        contentBox.style.background = "#ffffff";
        contentBox.style.padding = "30px";
    }

    function renderIframe(srcUrl) {
        contentBox.style.background = "transparent";
        contentBox.style.padding = "0";
        contentBox.innerHTML = `<iframe src="${srcUrl}"></iframe>`;
    }

    function adjustTextSize() {
        // Jika dibuka di TV/PC (Layar Lebar), perbesar font teks dokumen lokal secara otomatis
        if (window.innerWidth > 1024) {
            document.querySelectorAll('.large-text *').forEach(el => {
                el.style.fontSize = "26px";
                el.style.lineHeight = "1.8";
            });
        }
    }
</script>

</body>
</html>
