<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Document Viewer - KORPASGAT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Desain Modern, Kontras Tinggi & Sangat Ramah Layar TV / HP */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #11141a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: #1a1f2c;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 3px solid #3498db;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 15px;
        }

        /* Panel Kontrol Pengiriman File */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Tombol Upload untuk HP / PC */
        .btn-source {
            background-color: #e74c3c;
            color: white;
            padding: 10px 20px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            display: inline-block;
        }

        .btn-source:hover { background-color: #c0392b; }

        /* Input Link Cloud (Google Drive, Sheets, dll) */
        .cloud-input-group {
            display: flex;
            gap: 5px;
            width: 100%;
            max-width: 450px;
        }

        .cloud-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #34495e;
            border-radius: 6px;
            background-color: #2c3e50;
            color: white;
            font-size: 14px;
        }

        .btn-cloud {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-cloud:hover { background-color: #27ae60; }

        /* Area Tampilan Dokumen Utama */
        .viewer-area {
            flex: 1;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Box Konten Dokumen (Tulisan Besar otomatis disesuaikan untuk TV/HP) */
        .content-box {
            width: 100%;
            max-width: 1100px;
            background: #ffffff;
            color: #222222;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            font-size: 24px; /* Default besar agar terbaca jelas dari jauh di TV */
            line-height: 1.6;
            display: block;
            overflow-x: auto;
        }

        /* Styling Iframe pratinjau agar bersih memenuhi layar */
        iframe {
            width: 100%;
            height: 75vh;
            border: none;
            border-radius: 8px;
            background: white;
        }

        img {
            max-width: 100%;
            max-height: 75vh;
            display: block;
            margin: 0 auto;
            border-radius: 6px;
        }

        .status-tv {
            font-size: 14px;
            color: #bdc3c7;
            margin-top: 5px;
        }

        /* Responsivitas Otomatis untuk Layar HP */
        @media (max-width: 600px) {
            .content-box {
                font-size: 16px; /* Ukuran mengecil di HP agar pas di genggaman */
                padding: 15px;
            }
            .title { font-size: 18px; }
            .control-panel { flex-direction: column; width: 100%; }
            .cloud-input-group { width: 100%; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="title">📺 Universal Real-Time TV Monitor</div>
    <div class="control-panel">
        
        <div>
            <label for="fileInput" class="btn-source">📁 Kirim File dari HP/PC</label>
            <input type="file" id="fileInput" accept=".docx, .pdf, .txt, image/*" style="display: none;">
        </div>

        <div class="cloud-input-group">
            <input type="url" id="cloudUrl" class="cloud-input" placeholder="Masukkan Link Google Sheets dari HP...">
            <button class="btn-cloud" onclick="uploadLinkFromHp()">Kirim Link</button>
        </div>

    </div>
    <div class="status-tv">Sistem Sinkronisasi Otomatis Terhubung 🟢</div>
</div>

<div class="viewer-area">
    <div class="content-box" id="contentBox">
        <p style="text-align: center; color: #7f8c8d; font-size: 18px;" id="placeholderText">Menunggu kiriman data/dokumen dari perangkat HP...</p>
    </div>
</div>

<script>
    // =========================================================================
    // TEMPAT MENEMPELKAN API KEYS SUPABASE ANDA:
    // Ganti string di bawah ini dengan Project URL dan anon public key milik Anda
    // =========================================================================
    const SUPABASE_URL = "https://ftokzxocmfwzitafwqoz.supabase.co/rest/v1/";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0b2t6eG9jbWZ3eml0YWZ3cW96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzODQ0MjksImV4cCI6MjA5ODk2MDQyOX0.-gHTYgaL5Skq8BOLZ1g4wt74tcfTPcqBkt81u-8WHGU";
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const contentBox = document.getElementById('contentBox');

    // ===================================================
    // 1. PROSES UPLOAD FILE DARI PERANGKAT (HP / PC)
    // ===================================================
    document.getElementById('fileInput').addEventListener('change', async function(event) {
        const file = event.target.files[0];
        if (!file) return;

        alert("Sedang mentransfer file ke cloud, mohon tunggu sebentar...");
        const extension = file.name.split('.').pop().toLowerCase();
        const fileName = `remote_doc.${extension}`;

        // Mengunggah langsung dan menimpa file lama (upsert: true) di dalam Bucket 'dokumen'
        const { data, error } = await supabase.storage
            .from('dokumen')
            .upload(fileName, file, { upsert: true });

        if (error) {
            alert("Transfer file gagal: " + error.message);
        } else {
            // Dapatkan URL publik dari berkas yang diupload
            const { data: urlData } = supabase.storage.from('dokumen').getPublicUrl(fileName);
            
            // Mengirimkan instruksi Broadcast real-time agar layar TV yang stanby langsung memproses file
            await supabase.channel('tv_channel').send({
                type: 'broadcast',
                event: 'update_doc',
                payload: { url: urlData.publicUrl, type: 'file', ext: extension }
            });
            alert("File berhasil dikirim dan ditampilkan ke TV!");
        }
    });

    // ===================================================
    // 2. PROSES PENGIRIMAN LINK GOOGLE SPREADSHEET DARI HP
    // ===================================================
    async function uploadLinkFromHp() {
        let url = document.getElementById('cloudUrl').value.trim();
        if (!url) return alert("Silakan masukkan tautan terlebih dahulu!");

        let finalUrl = url;
        
        // Pembersihan otomatis format URL agar ramah tayang di iframe (Mode Preview)
        if (url.includes("docs.google.com/spreadsheets")) {
            let baseSpreadsheetUrl = url.split('/edit')[0];
            finalUrl = `${baseSpreadsheetUrl}/preview?rm=minimal`;
        } else if (url.includes("drive.google.com") || url.includes("docs.google.com")) {
            finalUrl = url.replace(/\/view\?usp=sharing|\/view|\/edit\?usp=sharing|\/edit/g, "/preview");
        }

        // Siarkan link tersebut ke TV secara langsung via broadcast
        await supabase.channel('tv_channel').send({
            type: 'broadcast',
            event: 'update_doc',
            payload: { url: finalUrl, type: 'link' }
        });
        alert("Link dokumen terkirim ke TV!");
    }

    // ===================================================
    // 3. SINKRONISASI REAL-TIME (PENERIMA LAYAR MONITOR TV)
    // ===================================================
    supabase.channel('tv_channel')
    .on('broadcast', { event: 'update_doc' }, (response) => {
        const payload = response.payload;
        tampilkanDokumen(payload);
    })
    .subscribe();

    // Fungsi utama penampil data di halaman web
    function tampilkanDokumen(payload) {
        contentBox.innerHTML = "";
        contentBox.style.background = "#ffffff";
        contentBox.style.padding = "30px";

        // Tampilan Link Google Sheets / PDF menggunakan Frame khusus
        if (payload.type === 'link' || payload.ext === 'pdf') {
            contentBox.style.background = "transparent";
            contentBox.style.padding = "0";
            contentBox.innerHTML = `<iframe src="${payload.url}"></iframe>`;
        } 
        // Pembacaan file Word .docx secara lokal
        else if (payload.ext === 'docx') {
            fetch(payload.url)
                .then(res => res.arrayBuffer())
                .then(buffer => {
                    mammoth.convertToHtml({arrayBuffer: buffer}).then(result => {
                        contentBox.innerHTML = `<div class="large-text">${result.value}</div>`;
                        adjustTextSize();
                    });
                });
        }
        // Penampil Gambar (Jadwal/Infografis)
        else if (['jpg', 'jpeg', 'png', 'gif'].includes(payload.ext)) {
            contentBox.style.background = "transparent";
            contentBox.innerHTML = `<img src="${payload.url}">`;
        }
        // Penampil dokumen Notepad .txt biasa
        else if (payload.ext === 'txt') {
            fetch(payload.url).then(res => res.text()).then(text => {
                contentBox.innerHTML = `<pre style="white-space: pre-wrap;">${text}</pre>`;
            });
        }
    }

    function adjustTextSize() {
        // Otomatis memperbesar teks dokumen jika mendeteksi layar lebar TV/PC
        if (window.innerWidth > 1024) {
            document.querySelectorAll('.large-text *').forEach(el => {
                el.style.fontSize = "26px";
                el.style.lineHeight = "1.8";
            });
        }
    }
</script>

</body>
</html>
