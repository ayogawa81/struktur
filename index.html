<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Real-Time TV Monitor - KORPASGAT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #11141a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background-color: #1a1f2c;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #3498db;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
        }
        .btn-source {
            background-color: #e74c3c;
            color: white;
            padding: 12px 24px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            display: inline-block;
            transition: background 0.2s;
        }
        .btn-source:hover { background-color: #c0392b; }
        .cloud-input-group {
            display: flex;
            gap: 5px;
            width: 100%;
            max-width: 500px;
        }
        .cloud-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #34495e;
            border-radius: 6px;
            background-color: #2c3e50;
            color: white;
            font-size: 14px;
        }
        .btn-cloud {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-cloud:hover { background-color: #27ae60; }
        .viewer-area {
            flex: 1;
            padding: 25px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .content-box {
            width: 100%;
            max-width: 1200px;
            background: #ffffff;
            color: #222222;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            font-size: 24px;
            line-height: 1.6;
            min-height: 300px;
        }
        iframe {
            width: 100%;
            height: 72vh;
            border: none;
            border-radius: 8px;
            background: white;
        }
        img {
            max-width: 100%;
            max-height: 72vh;
            display: block;
            margin: 0 auto;
            border-radius: 6px;
        }
        .status-tv {
            font-size: 13px;
            color: #2ecc71;
            margin-top: 12px;
            font-weight: bold;
            background: rgba(46, 204, 113, 0.1);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="title">📺 Universal Real-Time TV Monitor</div>
    
    <div class="control-panel">
        <div>
            <label for="fileInput" class="btn-source">📁 Kirim File dari HP/PC</label>
            <input type="file" id="fileInput" accept=".docx, .pdf, .txt, image/*" style="display: none;">
        </div>
        <div class="cloud-input-group">
            <input type="url" id="cloudUrl" class="cloud-input" placeholder="Masukkan Tautan Google Sheets / Slides / Drive / Web...">
            <button class="btn-cloud" onclick="kirimTautan()">Kirim Link</button>
        </div>
    </div>
    <div class="status-tv" id="koneksiStatus">Menghubungkan ke Sistem Jaringan...</div>
</div>

<div class="viewer-area">
    <div class="content-box" id="contentBox">
        <p style="text-align: center; color: #7f8c8d; font-size: 18px;">Menunggu kiriman data/dokumen dari perangkat HP...</p>
    </div>
</div>

<script>
    // FIX URL: Menggunakan URL Proyek utama yang bersih agar pemetaan endpoint SDK berjalan otomatis
    const SUPABASE_URL = "https://ftokzxocmfwzitafwqoz.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0b2t6eG9jbWZ3eml0YWZ3cW96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzODQ0MjksImV4cCI6MjA5ODk2MDQyOX0.-gHTYgaL5Skq8BOLZ1g4wt74tcfTPcqBkt81u-8WHGU";

    let supabaseClient = null;

    window.onload = function() {
        inisialisasiSupabase();
    };

    function inisialisasiSupabase() {
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            document.getElementById('koneksiStatus').innerHTML = "Sistem Sinkronisasi Otomatis Terhubung 🟢";
            
            supabaseClient.channel('tv_channel')
            .on('broadcast', { event: 'update_doc' }, (response) => {
                if(response.payload) tampilkanDokumen(response.payload);
            })
            .subscribe();
        } catch (e) {
            document.getElementById('koneksiStatus').innerHTML = "Gagal Terhubung ke Cloud Server 🔴";
            document.getElementById('koneksiStatus').style.color = "#e74c3c";
            document.getElementById('koneksiStatus').style.background = "rgba(231, 76, 60, 0.1)";
        }
    }

    document.getElementById('fileInput').addEventListener('change', async function(event) {
        if (!supabaseClient) return alert("Koneksi server terputus!");
        const file = event.target.files[0];
        if (!file) return;

        const extension = file.name.split('.').pop().toLowerCase();
        const uniqueTime = new Date().getTime();
        const secureFileName = `monitor_${uniqueTime}.${extension}`;
        
        document.getElementById('contentBox').innerHTML = '<p style="text-align: center; color: #3498db; font-size: 18px;">Sedang memproses dan mengunggah berkas ke cloud...</p>';

        try {
            // LOCK BUCKET: Tetap mengacu ke 'dokumen' (huruf kecil) sesuai nama aktual bucket Anda di storage
            const { data, error } = await supabaseClient
                .storage
                .from('dokumen')
                .upload(secureFileName, file, { 
                    cacheControl: '3600',
                    upsert: true
                });

            if (error) throw error;

            const { data: urlData } = supabaseClient.storage.from('dokumen').getPublicUrl(secureFileName);

            await supabaseClient.channel('tv_channel').send({
                type: 'broadcast',
                event: 'update_doc',
                payload: { url: urlData.publicUrl, type: 'file', ext: extension }
            });

            alert("Sukses! File berhasil disiarkan ke monitor TV.");
            document.getElementById('contentBox').innerHTML = '<p style="text-align: center; color: #2ecc71; font-size: 18px;">File sukses dikirim!</p>';
        } catch (error) {
            alert("Gagal Mengirim: " + error.message);
            document.getElementById('contentBox').innerHTML = '<p style="text-align: center; color: #e74c3c; font-size: 18px;">Gagal memproses file. Periksa kembali konfigurasi RLS bucket Anda.</p>';
        }
    });

    async function kirimTautan() {
        if (!supabaseClient) return alert("Koneksi server terputus!");
        let url = document.getElementById('cloudUrl').value.trim();
        if (!url) return alert("Silakan masukkan tautan terlebih dahulu!");

        let finalUrl = url;
        if (url.includes("docs.google.com/spreadsheets")) {
            finalUrl = `${url.split('/edit')[0]}/preview?rm=minimal`;
        } else if (url.includes("drive.google.com") || url.includes("docs.google.com")) {
            finalUrl = url.replace(/\/view\?usp=sharing|\/view|\/edit\?usp=sharing|\/edit/g, "/preview");
        }

        await supabaseClient.channel('tv_channel').send({
            type: 'broadcast',
            event: 'update_doc',
            payload: { url: finalUrl, type: 'link' }
        });
        alert("Link sukses disiarkan!");
        document.getElementById('cloudUrl').value = "";
    }

    function tampilkanDokumen(payload) {
        const box = document.getElementById('contentBox');
        box.innerHTML = "";
        box.style.background = "#ffffff";
        box.style.padding = "30px";

        if (payload.type === 'link' || payload.ext === 'pdf') {
            box.style.background = "transparent";
            box.style.padding = "0";
            box.innerHTML = `<iframe src="${payload.url}"></iframe>`;
        } else if (payload.ext === 'docx') {
            fetch(payload.url).then(res => res.arrayBuffer()).then(buffer => {
                mammoth.convertToHtml({arrayBuffer: buffer}).then(result => {
                    box.innerHTML = `<div style="font-size:24px; color:#222;">${result.value}</div>`;
                });
            });
        } else if (['jpg', 'jpeg', 'png', 'gif'].includes(payload.ext)) {
            box.style.background = "transparent";
            box.innerHTML = `<img src="${payload.url}?t=${new Date().getTime()}">`;
        } else if (payload.ext === 'txt') {
            fetch(payload.url).then(res => res.text()).then(text => {
                box.innerHTML = `<pre style="white-space: pre-wrap; font-size:20px; color:#222;">${text}</pre>`;
            });
        }
    }
</script>
</body>
</html>
