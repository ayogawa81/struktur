<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokal Document Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: #2c3e50; }
        .input-group {
            margin-bottom: 20px;
            padding: 20px;
            border: 2px dashed #3498db;
            border-radius: 6px;
            background: #ecf0f1;
            text-align: center;
        }
        input[type="file"] {
            font-size: 16px;
        }
        .viewer-container {
            margin-top: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 20px;
            min-height: 400px;
            background: #fff;
            overflow-y: auto;
            display: none;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Lokal Document Viewer 💻📄</h2>
    <p style="text-align: center;">Pilih file dari PC Anda (Mendukung .docx, .pdf, .txt, dan gambar)</p>
    
    <div class="input-group">
        <input type="file" id="fileInput" accept=".docx, .pdf, .txt, image/*">
    </div>

    <div class="viewer-container" id="viewerContainer"></div>
</div>

<script>
    document.getElementById('fileInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        const container = document.getElementById('viewerContainer');
        container.innerHTML = ""; // Bersihkan tampilan sebelumnya
        container.style.display = "block";

        if (!file) return;

        const fileType = file.name.split('.').pop().toLowerCase();

        // 1. JIKA FILE ADALAH PDF
        if (fileType === 'pdf') {
            const fileURL = URL.createObjectURL(file);
            container.innerHTML = `<iframe src="${fileURL}"></iframe>`;
        } 
        
        // 2. JIKA FILE ADALAH WORD (.DOCX)
        else if (fileType === 'docx') {
            const reader = new FileReader();
            reader.onload = function(event) {
                const arrayBuffer = event.target.result;
                
                // Menggunakan library Mammoth untuk konversi docx ke HTML
                mammoth.convertToHtml({arrayBuffer: arrayBuffer})
                    .then(function(result) {
                        container.innerHTML = result.value; // Tampilkan hasil konversi
                    })
                    .catch(function(err) {
                        container.innerHTML = "<p style='color:red;'>Gagal membaca file Word: " + err.message + "</p>";
                    });
            };
            reader.readAsArrayBuffer(file);
        } 
        
        // 3. JIKA FILE ADALAH NOTEPAD (.TXT)
        else if (fileType === 'txt') {
            const reader = new FileReader();
            reader.onload = function(event) {
                container.innerHTML = `<pre style="white-space: pre-wrap;">${event.target.result}</pre>`;
            };
            reader.readAsText(file);
        } 
        
        // 4. JIKA FILE ADALAH GAMBAR
        else if (['jpg', 'jpeg', 'png', 'gif'].includes(fileType)) {
            const fileURL = URL.createObjectURL(file);
            container.innerHTML = `<img src="${fileURL}" style="max-width:100%; height:auto; display:block; margin:0 auto;">`;
        } 
        
        // JIKA FORMAT TIDAK DIDUKUNG LOKAL
        else {
            container.innerHTML = `<p style="color:red; text-align:center;">Format .${fileType} belum didukung untuk dibaca langsung dari PC secara lokal.</p>`;
        }
    });
</script>

</body>
</html>
