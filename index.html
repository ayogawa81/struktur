<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struktur Organisasi - Korpasgat Column Layout</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0b1329; color: #f8fafc; min-height: 100vh;
            display: flex; flex-direction: column; overflow-x: auto; position: relative;
        }
        header {
            background: linear-gradient(90deg, #1c2541, #0b1329);
            padding: 20px 40px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 4px solid #f97316;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 100%; position: sticky; top: 0; z-index: 10;
        }
        .logo-title h1 { font-size: 2rem; font-weight: 800; letter-spacing: 1.5px; color: #ffffff; text-transform: uppercase; }
        .logo-title p { color: #f97316; font-size: 1rem; margin-top: 5px; font-weight: 600; letter-spacing: 0.5px; }
        
        /* CONTAINER STRUKTUR UTAMA */
        main { flex: 1; padding: 40px 20px; display: flex; justify-content: center; align-items: flex-start; min-width: 1200px; }
        .tree-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        /* BARIS UTAMA (ASLOG) */
        .top-leader-row { display: flex; justify-content: center; margin-bottom: 40px; position: relative; width: 100%; }
        
        /* GRUP DIVISI DI BAWAH ASLOG */
        .staff-divisions-container { display: flex; justify-content: center; gap: 60px; position: relative; padding-top: 20px; }
        
        /* GARIS HUBUNG UTAMA DARI ASLOG KE PARA PABANDYA */
        .staff-divisions-container::before {
            content: ''; position: absolute; top: -20px; left: 5%; right: 5%; height: 3px; background-color: #f97316;
        }
        .top-leader-row::after {
            content: ''; position: absolute; bottom: -40px; left: 50%; width: 3px; height: 40px; background-color: #f97316; transform: translateX(-50%);
        }

        /* SATUAN GRUP KOLOM KEBANDUAN (PABANDYA + STAFNYA) */
        .division-column { display: flex; flex-direction: column; align-items: center; gap: 30px; position: relative; }
        
        /* Garis vertikal pendek penghubung dari garis horizontal ke kepala Pabandya */
        .division-column::before {
            content: ''; position: absolute; top: -40px; width: 3px; height: 40px; background-color: #f97316;
        }

        /* GARIS HUBUNG VERTIKAL INTERNAL ANTARA PABANDYA KE KAUR-KAURNYA */
        .sub-staff-row { display: flex; flex-direction: column; align-items: center; gap: 20px; position: relative; padding-top: 20px; width: 100%; }
        .sub-staff-row::before {
            content: ''; position: absolute; top: -10px; left: 50%; width: 3px; height: 30px; background-color: #0284c7; transform: translateX(-50%);
        }

        /* KOTAK JABATAN (CARD) */
        .card {
            background: #1c2541; border: 2px solid #3a506b; border-radius: 14px;
            padding: 15px; width: 260px; text-align: center;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .card:hover { border-color: #f97316; transform: translateY(-3px); }
