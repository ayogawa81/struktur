<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer untuk TV</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #controls {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #111;
            padding: 15px 0;
            text-align: center;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
        }
        button {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 10px;
            transition: 0.2s;
        }
        button:hover { background-color: #007bff; }
        .btn-active { background-color: #dc3545 !important; } /* Warna merah saat auto-scroll aktif */
        #container {
            width: 100%;
            height: calc(100% - 80px);
            margin-top: 80px;
            overflow-y: auto; /* Memungkinkan container luar untuk di-scroll */
            scroll-behavior: smooth;
        }
        iframe {
            width: 100%;
            height: 4000px; /* Diperpanjang agar PDF panjang terlihat utuh dalam Google Viewer */
            border: none;
            transform-origin: top center;
            transition: transform 0.2s ease;
        }
    </style>
</head>
<body>

    <div id="controls">
        <button onclick="zoomIn()">Perbesar (+)</button>
        <button onclick="zoomOut()">Perkecil (-)</button>
        <button id="scrollBtn" onclick="toggleAutoScroll()">Mulai Gulir Otomatis</button>
    </div>

    <div id="container">
        <!-- GANTI URL DI BAWAH INI DENGAN LINK PDF PUBLIK ANDA -->
        <iframe id="pdfFrame" src="https://google.com"></iframe>
    </div>

    <script>
        var frame = document.getElementById('pdfFrame');
        var container = document.getElementById('container');
        var scrollBtn = document.getElementById('scrollBtn');
        
        var zoomLevel = 1.0;
        var scrollInterval = null;
        var isScrolling = false;
        var scrollSpeed = 1; // Menggulung sebesar 1 pixel tiap interval

        // Fungsi Zoom Kontrol
        function zoomIn() {
            zoomLevel += 0.15;
            applyZoom();
        }

        function zoomOut() {
            if (zoomLevel > 0.4) {
                zoomLevel -= 0.15;
                applyZoom();
            }
        }

        function applyZoom() {
            frame.style.transform = 'scale(' + zoomLevel + ')';
        }

        // Fungsi Otomatis Gulir Halaman (Auto-Scroll)
        function toggleAutoScroll() {
            if (isScrolling) {
                clearInterval(scrollInterval);
                scrollBtn.innerText = "Mulai Gulir Otomatis";
                scrollBtn.classList.remove('btn-active');
                isScrolling = false;
            } else {
                scrollBtn.innerText = "Berhentikan Gulir";
                scrollBtn.classList.add('btn-active');
                isScrolling = true;
                
                // Menjalankan scroll setiap 40 milidetik
                scrollInterval = setInterval(function() {
                    container.scrollTop += scrollSpeed;
                    
                    // Jika sudah mencapai ujung bawah dokumen, kembali ke atas otomatis
                    if (container.scrollTop + container.clientHeight >= container.scrollHeight - 2) {
                        container.scrollTop = 0;
                    }
                }, 40); 
            }
        }
    </script>
</body>
</html>
