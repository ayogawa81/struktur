<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Document Viewer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
        }
        .input-group {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        input[type="url"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .viewer-container {
            margin-top: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
            display: none; /* Sembunyikan sampai ada dokumen yg dimuat */
        }
        iframe {
            width: 100%;
            height: 600px;
            border: none;
        }
        .note {
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Online Document Viewer 📄✨</h2>
    <p style="text-align: center;">Membaca file PPTX, DOCX, XLSX, atau PDF langsung di browser.</p>
    
    <div class="input-group">
        <input type="url" id="docUrl" placeholder="Masukkan URL dokumen publik (contoh: https://example.com/file.pptx)">
        <button onclick="viewDocument()">Buka Dokumen</button>
    </div>
    <p class="note">*Catatan: File harus bersifat publik (bisa diakses internet) agar Google Viewer bisa membacanya.</p>

    <div class="viewer-container" id="viewerContainer">
        <iframe id="docViewer" src=""></iframe>
    </div>
</div>

<script>
    function viewDocument() {
        const urlInput = document.getElementById('docUrl').value.trim();
        const viewerContainer = document.getElementById('viewerContainer');
        const iframe = document.getElementById('docViewer');

        if (urlInput === "") {
            alert("Silakan masukkan URL dokumen terlebih dahulu!");
            return;
        }

        // Menggunakan Google Docs Viewer API
        // Encode URL agar karakter khusus aman dibaca oleh browser
        const googleViewerUrl = `https://docs.google.com/gview?url=${encodeURIComponent(urlInput)}&embedded=true`;

        // Set src iframe dan tampilkan container
        iframe.src = googleViewerUrl;
        viewerContainer.style.display = "block";
    }
</script>

</body>
</html>
